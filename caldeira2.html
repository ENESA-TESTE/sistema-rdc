<!DOCTYPE html>
<html>
<head>
  <title>Visão Raio-X - Enesa</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden; font-family: sans-serif;">
  
  <div style="position: absolute; top: 10px; left: 10px; z-index: 9999; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 5px;">
    <b>🥽 Visão Raio-X (Caldeira Enesa)</b><br>
    Aponte a câmera para o marcador HIRO impresso.
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <a-marker preset="hiro">
        <!-- Carregando a sua Caldeira Real (TESTE.glb) com escala de 2,5% -->
        <a-gltf-model src="https://raw.githack.com/ENESA-TESTE/sistema-rdc/main/TESTE.glb" scale="0.025 0.025 0.025" position="0 0 0"></a-gltf-model>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
