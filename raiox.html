<!DOCTYPE html>
<html>
<head>
  <title>Visão Raio-X - Enesa</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden; font-family: sans-serif;">
  
  <div style="position: absolute; top: 10px; left: 10px; z-index: 9999; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 5px;">
    <b>🥽 Visão Raio-X (BETA)</b><br>
    Aponte a câmera para o marcador HIRO impresso.
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <a-marker preset="hiro">
        <!-- Criando um "Tubo" em 3D amarelo -->
        <a-cylinder position="0 0.5 0" radius="0.3" height="2" color="#FFC65D" rotation="90 0 0"></a-cylinder>
        <!-- Um cubo vermelho para simular uma válvula -->
        <a-box position="0 0.5 0" depth="0.8" height="0.8" width="0.8" color="#FF0000"></a-box>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
