<!DOCTYPE html>
<html>
<head>
  <title>Visão Raio-X - Enesa (Gestos)</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <!-- Script para ativar gestos com o dedo na tela -->
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
</head>
<body style="margin: 0px; overflow: hidden; font-family: sans-serif;">
  
  <div style="position: absolute; top: 10px; left: 10px; z-index: 9999; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 5px;">
    <b>🥽 Visão Raio-X (Interativo)</b><br>
    Faça movimento de pinça para dar Zoom e arraste o dedo para girar a caldeira!
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" gesture-detector>
    <a-marker preset="hiro" raycaster="objects: .clickable" emitevents="true" cursor="fuse: false; rayOrigin: mouse;">
        <!-- Caldeira com ativação de gestos (gesture-handler) -->
        <a-entity
            gltf-model="https://raw.githack.com/ENESA-TESTE/sistema-rdc/main/TESTE.glb"
            scale="0.025 0.025 0.025"
            position="0 0 0"
            class="clickable"
            gesture-handler="minScale: 0.005; maxScale: 0.5"
        ></a-entity>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
